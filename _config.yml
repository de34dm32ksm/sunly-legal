# Jekyll-Konfiguration für GitHub Pages
# Custom Layout — kein Theme, eigenes _layouts/page.html mit Sunly-Branding

title: Sunly · Rechtliche Hinweise
description: Datenschutzerklärung, Nutzungsbedingungen und Impressum für die App Sunly
lang: de

# Markdown-Engine
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: page
