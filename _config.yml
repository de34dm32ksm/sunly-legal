# Jekyll-Konfiguration für GitHub Pages
# Custom Layout — kein Theme, eigenes _layouts/page.html mit Sunly-Branding

title: Sunly · Rechtliche Hinweise
description: Datenschutzerklärung, Nutzungsbedingungen und Impressum für die App Sunly
lang: de

# URL-Struktur für GitHub Pages Project-Site:
#   Live-URL: https://de34dm32ksm.github.io/sunly-legal/
#   baseurl muss "/sunly-legal" sein, damit relative_url-Filter im Layout
#   die internen Links (./privacy, ./terms etc.) korrekt prefixen.
url: "https://de34dm32ksm.github.io"
baseurl: "/sunly-legal"

# Markdown-Engine
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: page
