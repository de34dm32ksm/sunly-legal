<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'de' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} · Sunly</title>
  <meta name="description" content="{{ page.title }} der App Sunly — privates Hobby-Projekt von Marius Alexander Becker.">
  <meta name="theme-color" content="#FFC83D">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #FFFBF2;
      color: #1A1410;
      margin: 0;
      padding: 0;
      line-height: 1.65;
      font-size: 16px;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }
    header.brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 22px;
      border-bottom: 1px solid rgba(10, 10, 10, 0.08);
      margin-bottom: 32px;
    }
    .brand-logo {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: #FFC83D;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 4px 14px rgba(255, 200, 61, 0.42);
      flex-shrink: 0;
    }
    .brand-name {
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }
    .brand-sub {
      font-size: 13px;
      color: #7A6E5F;
      margin-top: 3px;
      font-weight: 500;
    }
    nav.toc {
      background: #FFFFFF;
      border: 1px solid rgba(10, 10, 10, 0.08);
      padding: 14px 18px;
      border-radius: 14px;
      margin: 0 0 36px;
      box-shadow: 0 1px 3px rgba(10, 10, 10, 0.04);
      font-size: 13px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 18px;
    }
    nav.toc a {
      color: #1A1410;
      text-decoration: none;
      font-weight: 600;
      padding: 4px 0;
      transition: color 0.15s;
    }
    nav.toc a:hover { color: #C28B00; }
    nav.toc a.active { color: #C28B00; }
    main h1 {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.5px;
      margin: 0 0 12px;
    }
    main h2 {
      font-size: 19px;
      font-weight: 700;
      margin: 36px 0 12px;
      padding-top: 20px;
      border-top: 1px solid rgba(10, 10, 10, 0.06);
      letter-spacing: -0.2px;
    }
    main h2:first-of-type {
      border-top: none;
      padding-top: 0;
      margin-top: 24px;
    }
    main h3 {
      font-size: 16px;
      font-weight: 700;
      margin: 22px 0 8px;
    }
    main p, main li { font-size: 15px; }
    main a {
      color: #C28B00;
      text-decoration: underline;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 2px;
    }
    main a:hover { color: #1A1410; }
    main strong { font-weight: 700; color: #1A1410; }
    main em { font-style: italic; }
    main ul, main ol { padding-left: 22px; }
    main li { margin: 5px 0; }
    main hr {
      border: none;
      border-top: 1px solid rgba(10, 10, 10, 0.1);
      margin: 32px 0;
    }
    main table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
      font-size: 14px;
      background: #FFFFFF;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(10, 10, 10, 0.04);
    }
    main th, main td {
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(10, 10, 10, 0.06);
    }
    main th {
      background: #FFF8E6;
      font-weight: 700;
      color: #1A1410;
    }
    main tr:last-child td { border-bottom: none; }
    main code {
      background: rgba(10, 10, 10, 0.06);
      padding: 2px 6px;
      border-radius: 5px;
      font-size: 13px;
      font-family: 'JetBrains Mono', 'Cascadia Code', Consolas, monospace;
    }
    main pre {
      background: #1A1410;
      color: #FFF8E6;
      padding: 14px 18px;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
    }
    main pre code {
      background: transparent;
      padding: 0;
      color: inherit;
    }
    main blockquote {
      border-left: 3px solid #FFC83D;
      margin: 18px 0;
      padding: 12px 16px;
      background: #FFF8E6;
      border-radius: 0 10px 10px 0;
      color: #1A1410;
      font-style: italic;
    }
    main blockquote p { margin: 6px 0; }
    footer.brand-footer {
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid rgba(10, 10, 10, 0.08);
      font-size: 13px;
      color: #7A6E5F;
      text-align: center;
      line-height: 1.7;
    }
    footer.brand-footer a {
      color: #7A6E5F;
      text-decoration: underline;
    }
    footer.brand-footer a:hover { color: #1A1410; }
    @media (max-width: 540px) {
      .container { padding: 24px 18px 60px; }
      main h1 { font-size: 24px; }
      main h2 { font-size: 17px; }
      main p, main li { font-size: 14.5px; }
      main table { font-size: 13px; }
      main th, main td { padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="brand">
      <div class="brand-logo" aria-hidden="true">☀️</div>
      <div>
        <div class="brand-name">Sunly</div>
        <div class="brand-sub">{{ page.title }}</div>
      </div>
    </header>

    <nav class="toc" aria-label="Rechtliche Dokumente">
      <a href="{{ '/' | relative_url }}">🏠 Übersicht</a>
      <a href="{{ '/privacy' | relative_url }}">🔒 Datenschutz</a>
      <a href="{{ '/terms' | relative_url }}">📜 Nutzungsbedingungen</a>
      <a href="{{ '/privacy-en' | relative_url }}">🇬🇧 Privacy (EN)</a>
      <a href="{{ '/terms-en' | relative_url }}">🇬🇧 Terms (EN)</a>
    </nav>

    <main>
      {{ content }}
    </main>

    <footer class="brand-footer">
      Sunly &middot; privates, nicht-kommerzielles Hobby-Projekt<br>
      <a href="mailto:mail@mariusbecker.me">mail@mariusbecker.me</a>
    </footer>
  </div>
</body>
</html>
